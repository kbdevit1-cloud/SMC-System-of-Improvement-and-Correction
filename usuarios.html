<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Usuários SMC</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#07111f,#050b16);color:#f4f8ff;padding:24px}.wrap{width:min(1100px,100%);margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.card{background:#102540;border:1px solid #24425f;border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.32);padding:18px}h1{margin:0;font-size:28px}p{color:#c7d7ea}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(5,13,25,.45)}.stat strong{display:block;font-size:25px}.stat span{font-size:12px;color:#91a6bc}button,a{border:0;border-radius:10px;padding:11px 14px;background:#2f80ed;color:white;text-decoration:none;font-weight:800;cursor:pointer}.secondary{background:rgba(255,255,255,.08);border:1px solid #24425f}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}input,select{border:1px solid #24425f;background:#050b16;color:white;border-radius:10px;padding:11px 12px}.tablewrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid rgba(255,255,255,.08);padding:11px;text-align:left;font-size:13px}th{color:#cfe2fa;text-transform:uppercase;font-size:11px;background:rgba(255,255,255,.04)}.tag{display:inline-block;border-radius:999px;padding:5px 8px;font-weight:900;font-size:11px}.master{background:rgba(47,128,237,.2);color:#cfe2fa}.admin{background:rgba(34,197,94,.18);color:#d4ffe2}.usuario{background:rgba(245,158,11,.18);color:#fff0cf}.inativo{background:rgba(239,68,68,.16);color:#ffd3d3}.msg{font-weight:800;margin-top:12px}.err{color:#ffd0d0}@media(max-width:800px){.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><div><h1>Usuários SMC</h1><p>Área restrita para master e administradores.</p></div><button class="secondary" onclick="voltarSMC()">Voltar</button></div>
<div id="msg" class="msg">Validando acesso...</div>
<section id="area" style="display:none">
<div class="grid"><div class="stat"><strong id="stTotal">0</strong><span>Total</span></div><div class="stat"><strong id="stAtivos">0</strong><span>Ativos</span></div><div class="stat"><strong id="stAdmins">0</strong><span>Admins</span></div><div class="stat"><strong id="stUsuarios">0</strong><span>Usuários comuns</span></div></div>
<div class="card"><div class="toolbar"><input id="busca" placeholder="Buscar por nome ou e-mail" oninput="render()"><select id="perfil" onchange="render()"><option value="">Todos os perfis</option><option value="master">Master</option><option value="admin">Admin</option><option value="usuario">Usuário comum</option></select><select id="ativo" onchange="render()"><option value="">Todos</option><option value="true">Ativos</option><option value="false">Inativos</option></select><button onclick="carregar()">Atualizar</button></div><div class="tablewrap" id="tabela"></div></div>
</section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function voltarSMC(){if(window.opener&&!window.opener.closed){window.close();return}if(history.length>1){history.back();return}location.href='./?v=16'}
const client=supabase.createClient('https://quqqcudiyhajbmtrebvr.supabase.co','sb_publishable_X3m3BdRtfzaH4c12ehjkMw_VsqiZGJG',{auth:{persistSession:true,autoRefreshToken:true}});let usuario=null;let perfilAtual='publico';let rows=[];
function tagPerfil(p){if(p==='master')return'<span class="tag master">Master</span>';if(p==='admin')return'<span class="tag admin">Admin</span>';return'<span class="tag usuario">Usuário comum</span>'}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
async function iniciar(){const sess=await client.auth.getSession();usuario=sess.data.session?.user;if(!usuario){bloqueia('Acesso negado. Faça login como administrador para ver esta página.');return}const {data:me,error}=await client.from('usuarios_smc').select('perfil,ativo,email,nome').eq('email',usuario.email).maybeSingle();if(error){bloqueia('Não foi possível validar seu perfil.');return}perfilAtual=me?.perfil||'usuario';if(!me?.ativo || !['master','admin'].includes(perfilAtual)){bloqueia('Acesso restrito a master e administradores.');return}document.getElementById('msg').style.display='none';document.getElementById('area').style.display='block';carregar()}
function bloqueia(t){const m=document.getElementById('msg');m.textContent=t;m.classList.add('err')}
async function carregar(){const {data,error}=await client.from('usuarios_smc').select('nome,email,perfil,ativo,criado_em,atualizado_em').order('perfil',{ascending:true}).order('nome',{ascending:true});if(error){bloqueia('Falha ao carregar usuários. Verifique permissões no Supabase.');return}rows=data||[];render()}
function render(){const b=document.getElementById('busca').value.toLowerCase();const p=document.getElementById('perfil').value;const a=document.getElementById('ativo').value;let list=rows.filter(r=>(!b||String(r.nome+' '+r.email).toLowerCase().includes(b))&&(!p||r.perfil===p)&&(!a||String(r.ativo)===a));document.getElementById('stTotal').textContent=rows.length;document.getElementById('stAtivos').textContent=rows.filter(r=>r.ativo).length;document.getElementById('stAdmins').textContent=rows.filter(r=>['master','admin'].includes(r.perfil)).length;document.getElementById('stUsuarios').textContent=rows.filter(r=>r.perfil==='usuario').length;document.getElementById('tabela').innerHTML=list.length?`<table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Criado em</th></tr></thead><tbody>${list.map(r=>`<tr><td>${esc(r.nome||'-')}</td><td>${esc(r.email)}</td><td>${tagPerfil(r.perfil)}</td><td>${r.ativo?'Ativo':'<span class="tag inativo">Inativo</span>'}</td><td>${r.criado_em?new Date(r.criado_em).toLocaleString('pt-BR'):'-'}</td></tr>`).join('')}</tbody></table>`:'<p>Nenhum usuário encontrado.</p>'}
iniciar();
</script>
</body>
</html>
